name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest tests/ -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t deepfake-shield-api:ci .
      - name: Smoke-test container
        run: |
          docker run -d --name api -p 8000:8000 -e DB_PATH=/tmp/test.db deepfake-shield-api:ci
          for i in {1..15}; do
            if curl -sf http://localhost:8000/v1/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8000/v1/health | grep -q '"ok":true'
          docker rm -f api
